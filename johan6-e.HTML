<p>你是想把物品轉交給什麼人是嗎？ 那麼，首先要做的事情當然是按下<font fg=ffffff>TAB</font>鍵，打開道具欄。 在那裡放下道具，當然金幣也可以？ 總之，選擇道具後拖曳到要給予的對方身上。 像金幣一樣數量很多時，首先決定要給予的數量，這樣的話就很簡單。 
<br>
<p>啊，有一點需要注意的是，和對方的距離不能太遠。 因為不是把物品丟出去。 知道了吧？
