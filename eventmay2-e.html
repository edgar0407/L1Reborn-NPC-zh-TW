<font fg=ffffff><p align=left>純潔的處女梅梅：</p></font>
<br>
『鼓勵的藥水』裡裝有女神鼓勵的香水，這可以使勇者獲得強大的力量。<br>
『技術的藥水』裡裝有女神技術的香水，這可以幫助勇者的移動速度增加。<br>
<br>
另外，普若亞用盡全身的力量，並將最重要的香氣做成香水，
這種藥水正如其名就叫做『普若亞的香水』。
只要使用這種香水，勇者的雙手和雙腳都會受祝福的。<br>
<br>
最後普若亞女神還要我將耳環及項鍊送給亞丁最頂尖的勇士。<br>
女神還說會針對這些有佩帶飾品的人施展『普若亞的祝福』及『普若亞之吻』，好讓這些勇者在遭受到危險的時候會有它的庇護。<br>
