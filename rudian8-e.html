<font fg=ffffff><p align=left>陸地安:</p></font>
<br>
<p>喔喔喔… 沒錯… 這就是我朋友的袋子. 我朋友來這裡時曾揹著的袋子… 呼呼呼~</p>
<p>謝謝你. 我朋友現在總算能安息了. 我也可以幫朋友舉行葬禮. 真是謝謝你...</p>
<p>你也不要繼續待在這危險的地方, 趕緊離開吧! 雖然你很強, 但這裡也許還會出現其他可怕的對象.</p>
<p>...看你的眼神, 好像不相信我說的話. 好吧, 那我把這東西送給你. 這就是我朋友給我看, 讓我來到這裡的那張地圖.</p>
<p>那裡或許有偉大的寶藏, 或許有惡夢在等待, 我就送給你吧! 一直到最後, 請你幫忙確認我朋友想看的東西到底是什麼. 拜託了...</p>
