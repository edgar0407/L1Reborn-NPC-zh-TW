<br>
你是想要詢問關於我的存在根源嗎?<br>
那麼我就對你說吧. 讓我告訴你有關我誕生的驚奇故事.<br>
<br>
在歐瑞的象牙塔裡有個地方叫做'知識的寶庫'.<br>
那是迪嘉勒廷公爵建立的秘密圖書館. 那裡是保管世界的組合元素,以及各種現象法則, 魔法等珍貴文書的地點.<br>
也因此, 進出此處的管制非常嚴格.<br>
<br>
後來發生了黑暗妖精的侵攻事件, 白魔法師塔拉斯與迪嘉勒廷公爵為了守護亞丁, 便判斷需要公開'知識的寶庫'的部分文書.<br>
也因此, 象牙塔便將魔法師們派遣到亞丁各處, 並向亞丁人發送被施法的文書.<br>
象牙塔魔法師們向亞丁人發送的文書就是我了.<br>
