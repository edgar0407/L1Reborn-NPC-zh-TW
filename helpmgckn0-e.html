<br>
<font fg=ffffaf>騎士技能書等級</font>：<br>
施法者的技能等級：騎士所使用的技能與魔法不同，因此也不存在特別的技能等級，所有技能是依照各個技能書及等級來分為是否可學而已。<br>
基本上，大部分的技能書是從<font fg=afffff>50級</font>之後才可以學得到，因為這是成為騎士需要騎士的意志與精神力。<br>
<br>
<font fg=ffffaf>學習技能：</font><br>
因為與魔法不同，可以在任何一個地方直接從技能書上學習。<br>
所有技能書可以在指定地點或<font fg=afffff>任務相關ＮＰＣ</font>或<font fg=afffff>怪物</font>身上取得技能書。<br>
