<br>
歌唱之島的勞德說,<br>
'歌唱之島, 就像是說話之島的雙胞胎島'<br>
'說話之島上雖有修練場般各種新手冒險家的設施. 但還是潛藏著危害到新手性命的危險. 所以甘特為了讓這些人更安全, 讓他們能夠在這裡修練'.<br>
'歌唱之島上並沒有殺人者, 或應付不了的很多怪物, 也不會有已熟練的冒險家, 所以在這裡能夠與相同水準的朋友安心的修練.'<br>
'在這裡如果已成為不需在修練的程度, 就必須離開那裡.'<br>
並且, 歌唱之島上也有'變身術師, 防具強化師, 武器強化師'幫忙施法的人; 提醒有關'正義, 中立, 邪惡'善惡概念的人; 像'預言者'告知未來的人; 以及像'治療師'幫忙治癒新手的人.<br>
