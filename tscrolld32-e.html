<br>
又依照隱憂之谷貝爾吉特的話, <br>
'隱藏之谷是為新手騎士的修練場所.'<br>
'銀騎士村莊也有相同功能, 但是對於新手來說還是存在危險因素. 所以便建立了從危險中能夠保護新手, 讓他們能夠有效修練的地方.'<br>
'隱藏之谷並沒有非常強烈的怪物, 殺人者, 或妨礙新手修練的熟練冒險家. 不會有殺人者, 也絕對沒有無法應付的強怪.'<br>
結論是說, 歌唱之島與隱藏之島是專為新手的地區. 比起其他地區較為安全. 同樣也像歌唱之島一樣具備了變身術師, 防具強化師, 武器強化師'幫忙施法的人; 提醒有關'正義, 中立, 邪惡'善惡概念的人; 像'預言者'告知未來的人; 以及像'治療師'幫忙治癒新手的人.<br>
