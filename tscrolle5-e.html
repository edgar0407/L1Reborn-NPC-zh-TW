<br>
城堡就是管理某區域的團體, 為了從外部的侵略中保護自己的區域, 以沙土與岩石等堆積成的建築物.<br>
城堡中有城主, 城主之下有許多士兵.<br>
城堡保護範圍下, 也具有一個以上的村莊, 城主以保護村莊的代價, 每固定週期會收取稅金.<br>
並且, 城主也會透過 '攻城戰'而改變.<br>
<br>
總之, 最好成為城主或城堡的一員. 這樣就可以同時享有富與名利.<br>
<br>
<username>也日後在 '攻城戰'中勝利, 並追取富與名利吧.<br>
不過, 在攻城戰中敗仗也會得到不利的局面.<br>
<br>
有關城堡的情報, 目前在象牙塔中也持續增加當中, 完成的話, 就會派象牙塔圖書館派遣來的魔法師去散發.<br>
