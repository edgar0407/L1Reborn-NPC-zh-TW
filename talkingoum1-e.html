<font fg=ffffff><p align=left>逃亡歐姆者 :</p></font>
<br>
沒錯. 就是巨人創造了我們歐姆.<br>
<br>
不過巨人為何要創造我們? 為了向神挑戰? 還是單純只為了可以使喚的勞力?  
我們實在不懂.<br>
<br>
過去發生巨人消失的大變動後, 我們也只好繼續生存.<br>
<br>
這是因為神可憐我們嗎? 還是根本沒價值顧及?  
我們的創作主巨人以經消失了,   
我們也要逐漸面臨消失的命運.<br>
<br>
巨人消失後, 遇到了黑暗妖精. 
我們為何遇見他們? 難怪是神的詛咒? 我們只能一直被遺忘嗎?<br>
<br>
我們很想與黑暗妖精成為朋友. 但是他們只是控制利用我們. 
他們並沒有選擇要與我們共同生活. 我們與黑暗妖精的路已經產生了裂痕.<br>
<br>
