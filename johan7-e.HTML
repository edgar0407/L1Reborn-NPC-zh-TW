<font fg=ffffff><p align=left>喬漢：</p></font> 
<br>
<p>除了像我們這樣的商人，和你一樣的冒險者也可以進行交易。 因此，要和對方保持能夠交換物品的距離吧？ 然後，輸入<font fg=ffffff>/交換</font>試試看吧。 啊，不要忘了要和對方面對面。
<br>
<p>總之按照我說的做，就會出現交換視窗。 在交換視窗放上物品或金幣。 對方也會把物品放在上面的。 雙方都把物品放上後，點選 <font fg=ffffff>OK</font>就能交換。 當然雙方都要點選OK。 可以隨時取消，交換視窗的物品也會回到各自主人那裡，不用擔心。 
<br>
<p>最後給你一個忠告，世上的人不是都是好人。 要隨時注意。 是說物品或金幣的正確數量或性能等。 有可能是樣子一樣的物品，乍看金幣單位會不同之類的。 只要你小心地點選OK，就能避免這種事情發生吧？
