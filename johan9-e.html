<font fg=ffffff><p align=left>喬漢：</p></font> 
<br>
<p>如果說，武器是為了最快速地消滅敵人的話，防具則關係到能夠抵擋多少敵人的攻擊。 為了維持生命，可以說是最重要的因素吧？ 如果不幸被打敗，會丟掉珍貴的道具，也有可能失去長時間累積的經驗。 
<br>
<p>和武器相同，在道具欄裡選擇想要的防具<font fg=ffffff>點二下</font>就可裝備或解除。 但是，防具有一定的限制。 比如說雙手武器時，無法使用盾牌，穿在身上的防具按照<font fg=ffffff>衣服、盔甲、斗蓬</font>的順序才能裝備。 其實想想都很簡單。 因為，不能在盔甲上面穿衣服，或在斗蓬上面穿盔甲吧？ 當然脫下防具時，如果不先脫掉斗蓬就沒辦法脫掉盔甲或衣服。
