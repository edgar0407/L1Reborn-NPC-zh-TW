<p>他的海賊團...德雷克的海賊團是很有名的，你應該也知道吧? 他們是在全世界惡名昭彰的海賊團...<br>
<p>對於跟德雷克一起打拼的我們而言，天不怕地不怕，完全沒有考慮而恣意掠奪；德雷克的屬下有四名幹部.. 我、卡蜜拉和豪勢，迪哥，還有福朗克...<br>
<p>但是我們背叛了德雷克，不管是自願或是被別人利用，結果就是我們背叛了他；結果，德雷克就像現在那樣失去了所有的感情，成為充滿怒氣的靈魂。<br>
