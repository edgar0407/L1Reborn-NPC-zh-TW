<font fg=ffffff><p align=left>伊芙洛爾：</p></font>
<br>
以前在<font fg=ffffaf>水底通道</font>有一個監獄，為了關一些對抗伊娃和海音城的叛徒。<br>
但是在湖底有太多邪惡的怪物，後來我們無法阻止他們侵入。因此建設<font fg=ffffaf>伊娃神殿</font>後，就把這裡全封印起來了。<br>
<br>
很多人都認為地下神殿只是伊娃舉辦儀式的地方，
事實上湖水的下方是用來將法利昂以及受詛咒的生命體封印起來的地方，這魔做也是為了保護海音。<br>
雖然這些生命體是受法利昂的控制才會變成這樣，但也沒有其他辦法了。<br>
<br>
目前也有很多人說這些生命體將會成為水龍重新活過來的能量。<br>
我知道我應該去阻擋，但是我畢竟只是個神官，沒有能力去阻止。<br>
