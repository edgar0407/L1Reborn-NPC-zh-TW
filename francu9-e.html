<br>
<p>我還以為他瘋了，然後想要跑過去問他狀況的時候，卻被站在我後面的迪哥打暈了。<br>
<p>我在倒下去的時候有看到倒下角落的卡蜜拉，然後當我睜開眼睛的時候就已經是在這裡了。<br>
<p>但是我對豪勢並沒有憎恨之心，反正那傢伙也沒辦法接近寶物，也就是說，我的陷阱是很完美...哈哈<br>
<p>我只是擔心那傢伙再變回正常的樣子來這，拷問我之後解除陷阱，所以我漸漸把這裡弄得更複雜，好讓他沒辦法找到我。<br>
<p>覺得丟臉的是，我所尊敬的人卻死於我製作的陷阱，而且沒有顧慮到卡蜜拉...<br><br>
