<p>沒有，不知道豪勢在想什麼，並沒有殺了我，只是把我關在陰暗的地方，他驕傲的說，他將會擁有所有的寶物。<br>
<p>但是過了好幾天，他也沒有來...結果我在那裡感到很餓也很累而睡了過去，這樣的沉睡似乎直到你的到來。<br>
<p>......我也一直在想著，到底是為什麼，到底是為了什麼? <br>
<p>為何他們要背叛德雷克...我真的很想知道真相，但是我雖然只剩下靈魂，但是發現卻無法離開這裡...<br>
