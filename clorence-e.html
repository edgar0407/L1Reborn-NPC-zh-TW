<font fg=ffffff><p align=left>可羅蘭斯：</p></font>
<br>
我將我的一生無怨無悔的奉獻給長老<br>
不管是受到神意將丹特斯指名為新的領導者的時候，或是反王肯恩流亡到拉斯塔巴德的時候，我一直與歷史一同觀看著變化，就連長老巴洛梅斯臨死時的也是由我守護著。<br>
<br>
布魯迪卡來找我，問我是否要跟他一起離開，那時我阻止了他，但這並不表示我的想法與他不同。
我只是因為就算是再怎麼墮落，但他們還是我非常疼愛的同族人，這是無法捨棄。<br>
<br>
但是，長老會卻一直不斷地墮落。<br>
<br>
<a link="clorence1">怎麼說呢？</a>
