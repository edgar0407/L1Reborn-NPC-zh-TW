<font fg=ffffff><p align=left>李察:</p></font>
<br>
<P>為了重新找回亞丁王國的榮耀,首要的事情就是要驅逐反王.</p> 
<P>目前與他唱反調的人一個一個被逐出亞丁王國, 而反王的人馬又不斷的潛入亞丁王國,以目前的狀況來看,想要把他們一網打盡是不太可能的.目前也聽說有很多想要對抗反王的團體不斷的出現. 另外這些想要對抗反王的團體已經找到了先前亞丁王國王室的勳章,他們憑藉著這股象徵性的意義開始崛起. 但是另一方面我又聽說反王當時已將這個象徵給破壞了, 在破壞當時一分為二.</p> 
<P>其中一塊是在當時跟反王一起打天下,後來卻背判他的妖魔手上. 而這些妖魔為了避開反王的眼線,所以就躲到很深很深的洞穴裡去了.</p>
