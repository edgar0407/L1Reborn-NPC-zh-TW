<p>這封信是? ...我想起來了，對...我還記得他。<br>
<p>豪勢給我的情書...但是因為我很討厭他，當場就把信給丟掉了...<br>
<p>難道他還把信留著嗎，原來所有的起因都在我身上...<br>
<p>我無意中的行為，才是造成所有人承受悲哀結局的主要原因阿。<br>
<p>在這世上所作的業都會回到自己身上，依循著因果不息運轉著...<br>
<p>為什麼我這麼愚蠢呢，為什麼這麼殘忍呢...<br>
