<font fg=ffffff><p align=center>系統：隊伍</p></font><br>
玩家可以尋找志同道合的同伴組成隊伍。一個隊伍人數最多八名。隊員之間可以看到自己及隊員的血條，打完怪物後會分配經驗、正義、邪惡值。<br>
<br>
<font fg=ffffaf>組職隊伍：</font><br>
對著玩家在對話窗輸入<font  fg=afffff>/邀請隊員</font>，此時會產生新的隊伍。<br>
<br>
<font fg=ffffaf>邀請隊員：</font><br>
對著要加入的玩家面前輸入<font fg=afffff>/邀請隊員</font>指令，只有隊伍的領導者才能使用。<br>
<br>
<font fg=ffffaf>查看隊員名單：</font><br>
可輸入<font fg=afffff>/隊員名單</font>指令，確認組隊的角色名單。<br>
<br>
<font fg=ffffaf>驅逐隊員：</font><br>
隊伍的領導者可將隊員從隊伍驅逐。在對話窗輸入<font fg=afffff>/驅逐隊員 [玩家名稱]]</font>指令。<br>
<br>
<font fg=ffffaf>離開隊伍：</font><br>
在對話窗輸入<font fg=afffff>/離開隊伍</font>指令。若玩家想加入其他隊伍，一定得離開目前的隊伍才行。<br>
