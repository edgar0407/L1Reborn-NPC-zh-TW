<font fg=ffffff><p align=left>福朗克：</p></font>
<br>
<p>對付卡蜜拉就用德雷克當作誘餌，『在這次福朗克做的迷宮裡假裝受傷看看！ 只要這樣的話德雷克一定會衝來救你不是嗎? 試試看他對你的愛有多深啦，這不就是愛嗎? 』<br>
<p>結果她就進入我所做出來的迷宮中，並且裝受傷；我那時候在旁邊假裝維修陷阱，而迪哥去叫德雷克，將他帶過來。<br>
<p>德雷克接近她，一步...一步，又一步，就在那時候！地板突然塌陷，德雷克掉進我所設下的陷！<br>
<p>雖然現在回想起來很可惜，我的陷阱是非常完美的，他完全掉進裡面。<br>
<p>然後豪勢就一邊大笑一邊講：『過去並沒有任何人尊敬你這個船長！像你這種人只不過是因為寶物才會利用價值而已！你現在就給我消失掉！』<br><br>
<p><a link="francu9">...當時你在做什麼 </a><br>
