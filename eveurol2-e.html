<font fg=ffffff><p align=left>伊芙洛爾：</p></font>
<br>
沉睡在湖水底部的遺跡，其實那是水之女神伊娃所掌管的水中王國。<br>
依照海音建國的神話，當水龍法利昂出現時，所有的水源都被污染，以致於無法再待在水裡。
此時伊娃犧牲自己的王國並將法利昂封印在湖水的洞穴裡，後來帶著人民到陸地上來重建王國。<br>
那就是如今的海音城。<br>
<br>
為了將水龍法利昂封印，因而付出慘烈的代價，也因此法利昂的血污染了海音的水源。<br>
水中生物一如往常的生活，但發現水遭污染後為時已晚，身邊的朋友全部一改過去的溫和，而變成兇猛的怪物。<br>
