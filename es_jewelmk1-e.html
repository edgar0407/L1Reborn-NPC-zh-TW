<font fg=ffffff><p align=left>寶石車工師普蘭堤：</p></font>
<br>
你好我是寶石車工師普蘭堤。<br>
在活動開始之前，天堂聯合軍的總君主有特別拜託我。
他要我製作特殊的天堂項鍊送給亞丁的勇士們。<br>
<br>
這是君主的命令，所以我目前開始發送這個項鍊給各位勇士。<br>
但是，製作項鍊所需的材料紅寶石、藍寶石、鑽石必須自己準備。
這些東西你們可以去找我好朋友飛喬夫，但是那傢伙會依心情來賣寶石，總之他是個怪胎就是了。
所以各位勇士每週都要注意。<br>
<br>
只要一拿到車工的材料就立刻拿來給我吧，千萬不能拖喔。<br>
因為這是君主要送的禮物，所以我就不收工本費了。<br>
