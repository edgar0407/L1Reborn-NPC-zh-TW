<br>
<P>嗯... 我記得我之前對我朋友做了一些不好的事情...</p>
<P>我有個朋友亞南,他是個鐵匠...</p>
<P>他的手藝是無人不知的, 他所做的裝備幾乎可以當作是藝術品.</p>
<P>但是呢我這個笨蛋竟讓他進入了反王的勢力範圍去了.</p>
<P>我當時真的是身不由己,所以只好出賣我的朋友.</p>
<P>過去就過去了,但是現在我和亞南都在暗中幫助傑瑞德做一些有用的事情, 其中有一項工作是了解他們製造武器的技術.</p>
<P>我聽說還有一些黑騎士還保留著當時和亞南交易所使用的交易書.</p>
<P>如果你願意幫我將這破舊的交易書交給亞南的話,也會有好處能夠幫助你的.</p>
