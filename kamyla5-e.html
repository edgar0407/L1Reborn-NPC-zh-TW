<p>豪勢，他把迪哥還有福朗克當作為自己人，是不是他們也對德雷克有所不滿的呢? <br>
<p>後來豪勢也有叫我，說要我考驗一下德雷克對我的愛情...啊，這件事還沒有跟你說吧，我跟德雷克是情人關係。<br>
<p>考驗的內容大致上是：在一個已經廢棄的洞穴裡等他，而其他人告訴德雷克我受傷，看他是否會馬上趕過來。<br>
<p>他的確是馬上來了，結果就掉進福朗克所設計的陷阱中...我的記憶是到此為止而已。<br>
<p><a link="kamyla6">然後就變成幽靈了嗎 </a>
