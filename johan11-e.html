<br>
<p>狩獵動物時，會獲得肉。 你知道那些肉用在哪裡嗎？ 當然，你的答案很明顯。 肉當然是要拿來吃。 再怎麼勇猛的冒險家，餓著肚子怎麼使出力氣呢？ 
<br>
<p>不過饑餓時，最大的問題就是無法使用所有人都能聽得到的<font fg=ffffff>吶喊</font>。 基本上平時，不會特別饑餓或必須要吃肉，但是如果持續吶喊的話，一定會越來越餓的。 如果想避免這時的不利情況，就要找機會吃下足夠的肉。 
<br>
<p>而且還可以餵肉給野生動物或怪物，馴服成為寵物。 有沒有見過帶著狗的冒險者？ 那些人就是像現在說的，那樣用肉馴服成寵物的人。
