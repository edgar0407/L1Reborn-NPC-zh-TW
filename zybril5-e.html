<font fg=ffffff><p align=left>神官知布烈:</p></font>
<br>
喔...你要對你自己剛剛所說的話負責。<br>
<br>
我想你也很清楚。曾經美好的伊娃王國會變成這個樣子都是因為水龍 <font fg=ffffaf>法利昂</font> 才會搞成這樣的。<br>
原本伊娃有劃出一條界線，就連法利昂都不能隨便越界。
但是這可惡的怪物卻誘惑守護界線的巫女莎爾並偷走了伊娃的三叉戟才會這樣。<br>
從那之後事情就一發不可收拾了。<br>
<br>
法利昂用伊娃的三叉戟，摧毀了水的界線，並開始攻擊伊娃王國。<br>
還好有伊娃和海音騎士團的制止，終於把法利昂給封印了，但是 <font fg=ffffaf>法利昂的血</font>流了出來，污染了水，
而水中的生物都成了怪物。<br>
<br>
<a link="zybril6">真是可悲的事情啊。</a><br>
