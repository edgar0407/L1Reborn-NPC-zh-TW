<font fg=ffffff><p align=left>精靈墓穴看守者:</p></font>
<br>
以前，充滿好奇心的精靈在世界各地冒險旅行。<br><br>
神話中提到的巨人與神間的戰爭、惡魔與黑暗族的據點...他們發現與體驗了所有的遺跡。<br>
這裡也是充滿過去戰爭傷痛的地方...<br><br>
失控的精靈都是過去神的戰爭下產生的私生子、這裡蘊藏著所有喜怒哀樂。<br><br>
此處深淵湖是與世隔絕的孩子們的安息點。
在永恆的時間中、所有事物都只是盤旋、沒有人能夠將此處記憶帶著出去。<br><br>
我能說的只有這些了。<br>
