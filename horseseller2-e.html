<font fg=ffffff><p align=left>亞丁守護騎士團：</p></font>
<br>
 要訓練一匹野生的馬並不容易.
 也因此我們這個騎馬團會請法師幫忙, 因為他們的幫助我們才得以成功.<br>
 <br>
 馬這種動物是天生就很野蠻的, 所以其在馬背上的每一刻都要很小心.<br>
 所以一定要戴上 <font fg=ffffaf>騎馬用頭具</font>才比較安全, 為了養成大家都會戴頭具的好習慣,因此就將魔力置入頭具內.<br>
 <br>
 因為頭具上的魔力是有限次數的, 所以使用到次上限之後,馬就會開始不聽從君主的話了.
 這種時候就必須向同團的團員補充次數.<br>
