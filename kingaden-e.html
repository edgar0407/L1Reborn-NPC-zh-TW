<br><p>
我知道你想要講的話。<br>
我也對失去傑出的騎士感到悲哀。<br>
但我是這國家的王，現在是將把打倒巴拉卡斯的消息傳達四處，讓百姓高興才是。<br>
...<br>
當然，他變成死亡騎士的事情，離開這裡之後絕不可外傳。<br>
不需要讓這個國家的百姓產生新的恐怖，也不讓他家族的名譽受損。<br>
但是不要擔心，至少出現能夠給他永遠的安寧的騎士之前，會將他封印在大陸地監裡的。<br>
...<br>
現在你先退下吧，能夠給你看的也只有充血的雙眼而已．．．<br>
期待著為了勇士們所開的宴會吧．．．<br>
<br>
<br><a action="g">離開的時候看到王的雙肩因悲傷而發</a>
