<br>
<p>依我看來絕對是這樣，那傢伙完全沉迷於她，但是這樣又如何呢，卡蜜拉一心就是喜歡德雷克船長而以。<br>
<p>被忌妒給佔據的豪勢開始他的計畫，剛開始把迪哥當作自己人；迪哥那傢伙，雖然力氣很大、但是頭腦就少根筋。<br>
<p>話雖如此，但是如果迪哥本身沒有目的的話也不會纏在豪勢身邊吧...總之，讓迪哥成為自己人的豪勢就開始進行他的計畫...<br>
<p>先是迪哥接著就是我，他跟我說：『要不要讓德雷克看一下你的最新陷阱跟機器啊? 這樣以來他會另眼看待你的喔? 』<br>
<p>雖然現在覺得很丟臉，當時的我卻認為自己的才能是無限，也充滿著想要讓德雷克看到我的作品的想法，當時畢竟是熱血的年紀阿...<br><br>
<p><a link="francu8">那卡蜜拉呢 </a><br>
