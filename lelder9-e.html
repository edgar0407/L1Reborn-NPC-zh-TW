<font fg=ffffff><p align=left>蜥蜴人長老：</p></font>
<br>
<p>依照我這次派出去的戰士的報告，偷走那個寶物的就是我們前一任族長庫曼！<br>
<p>一直以來憎恨人類又好戰的他，卻想要把寶物賣給人類，哪有人會想到隱藏這麼大的陰謀！<br>
<p>拜託你，請您打倒庫曼並把寶物找回來，雖然可笑，但是這件事情只能拜託與我們不同種族的您了。<br>
<p>因為我們種族當中也有很多年輕人尊敬他，更有許多人視他為英雄，恕我無法把真相告訴他們，拜託你！<br>
<a action="B">雖然是很奇怪的要求但是我願意幫助您 </a><br>
