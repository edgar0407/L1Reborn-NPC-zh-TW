<font fg=ffffff><p align=left>古代文物專家迪艾司：</p></font>
<br>
<br>
哼．．哼哼．．你說什麼．．嘿嘿．．．
<br>
你說的那個古老項鍊．．．我可是被那條項鍊給害成這樣的。<br>
在我年輕的時候就已經得到了那條項鍊。
但是，因為項鍊埋在土裡太久，而失去它原有的光澤。
為了讓項鍊恢復原有的光澤，因而揮灑了我所有的財產，因此我成功了。<br>
不對，我失敗了！項鍊雖然恢復了，但卻沒有人可以戴上，結果只能當一個裝飾品。
嗯哼．．哼．．．我是個失敗的人，失敗的人啊！<br>
<br>
如果能有塔洛斯的鑽石的話，狀況或許會不一樣，但是塔洛斯在數十年前就失蹤了，我該到哪裡去找他呢．．嗚哼．．<br>
<br>
