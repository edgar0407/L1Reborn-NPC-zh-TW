<font fg=ffffff><p align=left>南瓜達人：</p></font>
<br><p>如果要解決他們，你必須取得可以模仿我們的兩個寶物。</p>  
<p>1.南瓜帽：如果沒有戴南瓜帽就只能看到它們的影子，因此為了要捕捉他們必須戴著帽子才能看到它們。</p>
<p>2.南瓜糖果：將南瓜糖果丟在地上，他們就會搶來吃。糖果裡面含有特殊的成份，它們吃下糖果後，才會掉落南瓜種子。<br>
<p>想要糖果或是南瓜帽子的話可以找我附近的南瓜搗蛋鬼買，沒辦法誰叫今天要多出這一個NPC跟我搶生意。
<p>對了，有種南瓜怪因為它的力量與飛龍相當所以你不用戴著南瓜帽也會看到它，它會掉落巨大南瓜種子，但你必需活著才拿得到。</p>
