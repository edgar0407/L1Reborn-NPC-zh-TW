'朋友'就是與自己親近相處的對象. '沙漠商人馬克'應該最清楚了.<br>
他說, '你擁有能夠互相吐露心情的朋友嗎? 現在如果你是一個人, 未來也可能是一個人. 每個人在年輕旺盛時, 認為自己可以完成所有事情. 但是隨著年紀越大, 你的體力也會越來越衰落. 這世界沒有永遠的強者. 當你年老困難時, 能夠真正幫助與安慰你的人, 就是你珍實的朋友了.<br>
<br>
朋友非常重要. 所以我們應該多結交朋友. <br>
<br>
