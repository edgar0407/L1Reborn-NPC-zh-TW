<font fg=ffffff><p align=left>說話卷軸 :</p></font>
<br>
密語是指, 只跟特定對象說話. <br>
<br>  
想要使用密語的話, 輸入<font fg=ffffaf>"[對方名稱] [想說的話]</font>, 再按鍵盤 Enter鍵.<br>
<username>想跟我用密語打招呼, 只要輸入 "說話卷軸 你好的型式, 再按鍵盤 Enter鍵, 我就會收到 <username>向我問好的密語. 這訊息只有我會看到.<br>
如果我不想聽 <username>的密語, 我可以輸入 <font fg=ffffaf>/封鎖 <username></font>再按鍵盤 Enter鍵, 我就不會再收到 <username>的訊息.<br>
不過, 雖然我封鎖了 <username>. 但是 <username>動員其他角色或朋友繼續給我密語的話, 我也可以輸入<font fg=ffffaf>/關閉密語</font>再按鍵盤 Enter鍵, 來阻擋所有密語.<br>
需要更多說明的話, 按住鍵盤 <font fg=ffffff>CTRL鍵的狀態同時按下H鍵</font>吧.<br>
