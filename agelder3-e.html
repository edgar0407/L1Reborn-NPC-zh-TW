<font fg=ffffff><p align=left>古代巨人長老 :</p></font>
<br>
過去，因為亞丁歷史學家『夏蒙』，曾在此被挖掘過。<br>
他為了向後世代揭發此處，開始進行修築陵墓，讓許多事物被揭露出來。<br>
<br>
但是魔族為了隱藏自身的存在，悄悄的接近夏蒙，將他變成魔族的奴隸。<br>
夏蒙的好友『卡西歐』便率領高崙守護者向魔族宣戰... <br>
很不幸地卡西歐戰敗身亡，他所率領的高崙守護者便受到魔族『墮落』的掌控。<br>
<br>
此後火焰之影命令墮落封印此處，此處便與外界隔絕了。<br>
