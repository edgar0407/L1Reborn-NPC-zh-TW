<br>
<p>..我就知道會這樣. 30年的朋友? 我可以料到她的反應… 嗯, 我知道了! 該死. 等著瞧. 哪一天我一定會得到希米哲的! 過不久我會在她的手指上套上這戒指! 我會給她幸福的!<br>
<p>啊, 這都是托你的福. 該死, 都一大把年紀了還要為愛展開拉踞戰嗎? 等著吧! 當你也有喜歡的人出現, 我也會馬上跑去幫忙的!<br>
<p>...雖然有些害羞沒面子. 但還是謝謝你. 托你的福, 讓我體驗了特別的經驗! 哈哈哈! <br><br>
