<font fg=ffffff><p align=left>阿福：</p></font>
<br>
我雖然外表是這樣，不過以前可是領主的屬下，為了打戰而拿起槍的軍人。當時為了親手保護我的家人，真的很努力打了。<br>
但回來之後，事情卻不是我所想的那個樣子..。因為在戰爭中我老婆死了，從祖父時代開始耕耘下來的土地也荒廢了...<br><br>
好不容易把那可惡的反王給趕走了，現在卻又來了一個拉斯塔巴德...說真的，現在這世界充滿了戰爭的氣息，真無法讓人安心的生活。<br>
我想，如果那避難到外國去的<a link="ofo2">王子</a>回來的話，或許能改變現狀...<br>
