<font fg=ffffff><p align=left>萊斯塔:</p></font>
<br>
<p>夥伴… 嗯. 讓我想到以前的事情. 我年輕時, 有2名最好的夥伴朋友. 一男一女. 我們三人總是膩在一起, 非常快樂.<br>
<p>我們三人一起離家, 偷搭海賊船, 被挨罵, 結果還要去打掃一切. 後來也共同成為海賊, 開始悲歡同享, 生死與共. 最後連海賊的生活也一起隱退了. 他們倆個也在隱退後結婚生子, 很有趣吧?<br>
<p>...其實, 我也很喜歡她. 從小一起長大, 所以性格也很相近, 互相也都沒有隱瞞... 而在我猶豫不決時, 就先被追走了...  這種故事很平常吧?<br>
<br>
<a link="resta7">那女人該不會是...</a>
