<font fg=ffffff><p align=left>陸地安:</p></font>
<br>
<p>是的! 那東西非人類, 也非一般生物. 他甚至不算是活著的!!</p>
<p>他們很殘忍, 首先砍殺了逃跑的女友. 並殺害了因憤怒而奔前的朋友..</p>
<p>我嗎? 呼呼… 我能做什麼? 我只能驚慌失措地逃跑. 我不顧朋友, 跑了一陣子, 心情稍平復後, 開始擔憂起朋友了… 但是我太恐懼實在不敢再回頭. 朋友受害, 我卻無法替他報仇, 甚至無法去確認我朋友的屍體!</p>
<p>看你手中的武器, 應該具備了一定的力量... 你能夠幫我報仇嗎? 我實在沒辦法. 我會的只有解讀文書而已. 請幫我殺害敵人. 讓我的朋友與女友的靈魂安息吧... 拜託你了...</p>
