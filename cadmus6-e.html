<br>
<p>啊..你帶地圖來了，那麼這樣吧！在我合併湊地圖的期間，我有事想要拜託你。<br>
<p>我的孫子嘛，他非常頑皮好動、喜歡到各處玩耍；但是我剛聽到，他竟跑到村莊外面！<br>
<p>你也是旅行者，所以應該知道....這村莊外的森林非常的恐怖，有很多危險的怪物或動物...請你幫我找回孫子，雖然說他還算小可是我應該要教訓教訓他..哼哼<br>
<p>拜託了，在幫我找回孫子的期間，我會將這些地圖併湊起來。<br>
