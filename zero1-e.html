<font fg=ffffff><p align=left>傑羅:</p></font>
<br>
<P>你也是從另一個土地來推翻對抗反王的人嗎?</p>
<P>如果是這樣，我要告訴你君主給我們的一些舉世名言。</p>
<P>1、如果你是君主，要視名譽為最甚至勝過自己。</p>
<P>2、如果你是君主，要視血盟員為最甚至勝過自己。</p>
<P>3、如果你是君主，必須保持威嚴不輕舉妄動。</p>
<P>4、如果你是君主，必須了解剛柔的真正意義。</p>
<P>5、如果你是君主，血盟員若有危險必須要有犧牲自己的打算。</p>
<P>最後一點，你的一句話可以讓血盟員遭受死亡，但另一方面也可以帶他們上天堂，你一定要記住我說的話。</p>
