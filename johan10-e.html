<br>
<p>基本上防具越好，實力越突出，可以少受到敵人的攻擊，但戰鬥可不是那麼簡單的。 最終難免會有受傷的情況發生。 所以，受傷時需要的就是藥水。 <br>
<p>當然現在說的是治療傷口最基本的藥水。 當然喝下後，發生效果需要一段時間，所以也不能一直喝，但沒有藥水就去冒險是不可能的。 使用時，和大部分道具一樣在道具欄裡<font fg=ffffff>點二下</font>就可以。 <br>
<p>此外，還有中毒時恢復狀態的藥，或是提高自己速度的輔助藥水。 應對各種情況，並依照種類準備好，在突發事情時肯定會有幫助的。 知道了吧？
