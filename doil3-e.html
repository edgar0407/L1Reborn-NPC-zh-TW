<p>德雷克似乎非常的富有. 他擁有全世界的金銀寶物. 所以, 他死去後, 幾乎所有的寶物都被其他船員分走了.<br>
<br>不過, 據傳還有些寶物沒有被分走. 我曾聽來過這裡的旅行者們說, 德雷克將自己最衷愛的寶物藏在海賊島某處.
<p>我也想要去尋寶... 不要把我的份有找到才好...<br>
