<font fg=ffffff><p align=left>亞塔路帝：</p></font>
<br>
雖然看不到，卻有著清晰的耳朵，雖然無法寫字，卻有著能夠戲弄對方的舌頭，就是因為這樣才能夠記錄真實的事情。<br>
就像師父所說的，一個一個字的記載下來，這所完成的就是拉斯塔巴德的歷史書。<br>
師父希望能將逐漸墮落的暗黑妖精的歷史一一的記載下來，讓後代的子孫不要再犯同樣的過錯。<br>
<br>
但是，世界並不放著我們不管，師父寫完最後一張之後就自盡，離開了人世。<br>
<br>
<a link="ataroze2">希望他能夠獲得平安</a><br>
