<p>年輕人. 你知道風木村莊是怎樣的地方嗎?
<p>在風木村莊有個很大的葡萄園. 它位於沙漠與綠地的交界線, 但是葡萄卻能長的很好.
<p>風木城的地下有被封印的巴列斯. 巴列斯召喚出地獄之犬,在裡面與城堡的騎士團長期進行著生死之戰...
<p>現在你了解風木葡萄園的秘密了吧? 在這般肥沃的土地上, 當然葡萄會長的很好了...
<p>我想見葡萄園的主人... 先了解這個人有著怎樣的想法, 我再判斷是否可以將這事實說出來...
<p>
